# settings.example.toml — non-secret application knobs.
# Copy to `settings.toml` to override defaults. Secrets go in `.env`, NOT here.

[models]
# Claude model used for scoring + drafting (quality matters here).
brain = "claude-opus-4-8"
# Optional cheap pre-filter model to drop obvious non-fits before paying for the brain.
prefilter = "claude-haiku-4-5"

[limits]
# Hard daily spend cap (USD) on Claude usage. A run halts if it would exceed this.
daily_spend_cap_usd = 5.0
# Max prospects processed per run (a safety brake while you're learning).
max_prospects_per_run = 100
# Max messages sent per day per channel (used once sending is enabled).
daily_send_cap = 25

[scoring]
# Run the cheap prefilter before the brain to save cost on obvious non-fits.
use_prefilter = false

[paths]
# Config file locations (relative to repo root).
icp = "config/icp.yaml"
value_prop = "config/value_prop.yaml"
message_guidelines = "config/message_guidelines.md"

[lusha]
# Max contacts to fetch per prospecting/signals run (a safety brake on credit spend).
max_prospects = 100
# How many days back to look for signal events (promotions, company changes).
signals_days_back = 90
# Signal types to filter on. Run `leia config-check` to see valid values from Lusha.
signal_types = ["promotion", "companyChange"]

[companies_house]
# UK discovery source (free API). Find companies by SIC code + location, then
# emit their officers as prospects with a "why-now" trigger. Needs
# COMPANIES_HOUSE_API_KEY in .env. Mind the 600 requests / 5 min rate limit.
sic_codes = []          # e.g. ["10110", "52100"] — Tier A/B EE sectors
location = ""           # e.g. "Manchester" (blank = anywhere in the UK)
max_companies = 20
officers_per_company = 2

[jobspy]
# Public job-posting hiring signals (optional `python-jobspy` dependency).
search_terms = ["energy manager", "head of procurement"]
location = "United Kingdom"
sites = ["indeed", "linkedin"]
results = 20
