<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · PROJECT-LEIA</title>
  <link rel="stylesheet" href="/static/style.css?v=ee-1" />
</head>
<body class="login-body">
  <div class="login-card card">
    <div class="brand" style="justify-content:center">
      <div class="brand-mark">L</div>
      <div class="brand-text">LEIA<span>lead-gen agent</span></div>
    </div>
    <p class="sub" style="text-align:center">Sign in to your control center</p>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" autocomplete="username" required />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
      <button class="btn primary" type="submit" style="width:100%">Log in</button>
    </form>
    <div class="result" id="login-msg"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/login.js?v=ee-1"></script>
</body>
</html>
